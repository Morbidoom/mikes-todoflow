<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ears (behind head) -->
  <polygon points="17,44 9,14 37,36" fill="#D97D1A"/>
  <polygon points="83,44 91,14 63,36" fill="#D97D1A"/>
  <!-- Inner ears -->
  <polygon points="19,41 14,22 33,35" fill="#F5B8A0"/>
  <polygon points="81,41 86,22 67,35" fill="#F5B8A0"/>

  <!-- Head -->
  <ellipse cx="50" cy="57" rx="38" ry="34" fill="#E8922A"/>

  <!-- Tabby forehead stripes -->
  <path d="M42,28 Q50,26 58,28" stroke="#C97015" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M39,34 Q50,32 61,34" stroke="#C97015" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M38,39 Q50,37 62,39" stroke="#C97015" stroke-width="1.4" fill="none" stroke-linecap="round"/>

  <!-- White muzzle -->
  <ellipse cx="50" cy="68" rx="21" ry="16" fill="#FFF3E2"/>

  <!-- === LEFT EYE === -->
  <!-- Outer glow -->
  <ellipse cx="34" cy="53" rx="13" ry="13.5" fill="#D4ECF7" opacity="0.4"/>
  <!-- Sclera -->
  <ellipse cx="34" cy="53" rx="11" ry="11.5" fill="white"/>
  <!-- Iris -->
  <ellipse cx="34" cy="54" rx="7.5" ry="8" fill="#3D2A18"/>
  <!-- Iris color ring -->
  <ellipse cx="34" cy="54" rx="7.5" ry="8" fill="none" stroke="#6B4226" stroke-width="1.2"/>
  <!-- Main shine (large) -->
  <circle cx="29.5" cy="49.5" r="3.2" fill="white"/>
  <!-- Secondary shine (small) -->
  <circle cx="36.5" cy="57" r="1.6" fill="white" opacity="0.7"/>

  <!-- === RIGHT EYE === -->
  <!-- Outer glow -->
  <ellipse cx="66" cy="53" rx="13" ry="13.5" fill="#D4ECF7" opacity="0.4"/>
  <!-- Sclera -->
  <ellipse cx="66" cy="53" rx="11" ry="11.5" fill="white"/>
  <!-- Iris -->
  <ellipse cx="66" cy="54" rx="7.5" ry="8" fill="#3D2A18"/>
  <!-- Iris color ring -->
  <ellipse cx="66" cy="54" rx="7.5" ry="8" fill="none" stroke="#6B4226" stroke-width="1.2"/>
  <!-- Main shine (large) -->
  <circle cx="61.5" cy="49.5" r="3.2" fill="white"/>
  <!-- Secondary shine (small) -->
  <circle cx="68.5" cy="57" r="1.6" fill="white" opacity="0.7"/>

  <!-- Nose -->
  <path d="M46,66 L50,63 L54,66 L50,69 Z" fill="#E07070" stroke="#C44040" stroke-width="0.5"/>

  <!-- Mouth -->
  <path d="M50,69 Q44,74 40,72" stroke="#C44040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M50,69 Q56,74 60,72" stroke="#C44040" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="22" cy="67" rx="7" ry="4" fill="#F5927A" opacity="0.22"/>
  <ellipse cx="78" cy="67" rx="7" ry="4" fill="#F5927A" opacity="0.22"/>

  <!-- Whiskers left -->
  <line x1="6"  y1="62" x2="40" y2="65" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.9"/>
  <line x1="6"  y1="67" x2="40" y2="67" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.9"/>
  <line x1="8"  y1="72" x2="40" y2="69" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.9"/>

  <!-- Whiskers right -->
  <line x1="94" y1="62" x2="60" y2="65" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.9"/>
  <line x1="94" y1="67" x2="60" y2="67" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.9"/>
  <line x1="92" y1="72" x2="60" y2="69" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.9"/>

  <!-- Collar (teal) -->
  <path d="M16,81 Q50,93 84,81" stroke="#3AABA6" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Collar shine -->
  <path d="M20,79 Q50,90 80,79" stroke="#5DCFCA" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Collar tag -->
  <circle cx="50" cy="91" r="6.5" fill="#7A7A7A" stroke="#555" stroke-width="0.8"/>
  <text x="50" y="94" text-anchor="middle" font-size="4.5" font-weight="bold" fill="white" font-family="Arial, sans-serif">MIKE</text>
</svg>
