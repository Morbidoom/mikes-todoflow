<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mike's TodoFlow</title>
    <link rel="icon" type="image/svg+xml" href="mike.svg" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>

    <!-- ===== Login Screen ===== -->
    <div class="login-screen" id="loginScreen">
      <div class="login-card">
        <img src="mike.svg" alt="Mike" class="login-mike" />
        <h1 class="login-title">Mike's TodoFlow</h1>
        <p class="login-sub">Entre com sua conta Google para salvar suas tarefas em qualquer dispositivo.</p>
        <button class="login-google-btn" id="loginBtn">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Entrar com Google
        </button>
      </div>
    </div>

    <!-- ===== App ===== -->
    <div class="app-wrapper" id="appWrapper">
      <header class="app-header">
        <div class="header-content">
          <div class="header-top">
            <div class="logo">
              <img src="mike.svg" alt="Mike" class="logo-icon" />
              <span>Mike's TodoFlow</span>
            </div>
            <div class="header-right">
              <div class="date-display" id="dateDisplay"></div>
              <div class="user-info">
                <img class="user-avatar" id="userAvatar" src="" alt="" />
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" id="logoutBtn" title="Sair">
                  <i class="fa-solid fa-right-from-bracket"></i>
                </button>
              </div>
            </div>
          </div>
          <div class="progress-section">
            <div class="progress-info">
              <span id="progressLabel">0 de 0 tarefas concluídas</span>
              <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </div>
        </div>
      </header>

      <main class="app-main">
        <div class="input-section">
          <div class="input-row">
            <div class="input-wrapper">
              <i class="fa-solid fa-plus input-icon"></i>
              <input
                type="text"
                id="taskInput"
                placeholder="Adicionar nova tarefa..."
                maxlength="120"
                autocomplete="off"
              />
              <select id="categorySelect">
                <option value="personal">Pessoal</option>
                <option value="work">Trabalho</option>
                <option value="study">Estudo</option>
                <option value="health">Saúde</option>
                <option value="other">Outro</option>
              </select>
            </div>
            <button id="addBtn" class="add-btn">
              <i class="fa-solid fa-arrow-right"></i>
            </button>
          </div>
        </div>

        <div class="filter-section">
          <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">
              Todas <span class="tab-count" id="countAll">0</span>
            </button>
            <button class="filter-tab" data-filter="active">
              Ativas <span class="tab-count" id="countActive">0</span>
            </button>
            <button class="filter-tab" data-filter="completed">
              Concluídas <span class="tab-count" id="countCompleted">0</span>
            </button>
          </div>
          <button class="clear-btn" id="clearCompleted" title="Remover concluídas">
            <i class="fa-solid fa-trash-can"></i>
            <span>Limpar concluídas</span>
          </button>
        </div>

        <div class="category-filter">
          <button class="cat-chip active" data-cat="all">Todas</button>
          <button class="cat-chip" data-cat="personal">
            <i class="fa-solid fa-user"></i> Pessoal
          </button>
          <button class="cat-chip" data-cat="work">
            <i class="fa-solid fa-briefcase"></i> Trabalho
          </button>
          <button class="cat-chip" data-cat="study">
            <i class="fa-solid fa-book"></i> Estudo
          </button>
          <button class="cat-chip" data-cat="health">
            <i class="fa-solid fa-heart"></i> Saúde
          </button>
          <button class="cat-chip" data-cat="other">
            <i class="fa-solid fa-tag"></i> Outro
          </button>
        </div>

        <ul class="task-list" id="taskList"></ul>

        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <i class="fa-regular fa-clipboard"></i>
          </div>
          <p class="empty-title">Nenhuma tarefa encontrada</p>
          <p class="empty-sub">Adicione uma nova tarefa para começar!</p>
        </div>
      </main>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="app.js"></script>
  </body>
</html>
